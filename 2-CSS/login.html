<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container"></div>
    <form class="login-form"></form>
    <h1>FOOD STORE </h1>
    <H2>Iniciar Sesión</H2>

    <label for="email">Email:</label>
    <input type="email" name="email" id="email" placeholder="tucorreo@mail.com" required>

    <label for="password">Contraseña:</label>
    <input type="password" name="password" id="password" placeholder="Minimo 8 caracteres" required>

    <button type="submit">INGRESAR</button>

    <p class="registro">¿No tenes cuenta? <a href="#">Registrate acá</a></p>
</body>
</html>

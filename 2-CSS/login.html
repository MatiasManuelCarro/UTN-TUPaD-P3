<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="container">
        <form class="login-form">
            <h1>FOOD STORE </h1>
            <H2>Iniciar Sesión</H2>

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="tucorreo@mail.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" name="password" id="password" placeholder="Minimo 8 caracteres" required>

            <button type="submit">INGRESAR</button>

            <p class="registro">¿No tenés cuenta? <a href="#">Registrate acá</a></p>
        </form>
    </div>
</body>

</html>

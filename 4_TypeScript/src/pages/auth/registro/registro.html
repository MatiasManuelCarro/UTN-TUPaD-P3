<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Registro</title>
</head>

<body>
    <main>
        <h1>Registro</h1>
        <form id="register-form" novalidate>
            <label for="email">Email</label>
            <input id="email" type="email" required />

            <label for="password">Contraseña</label>
            <input id="password" type="password" minlength="6" required />

            <label for="confirm-password">Confirmar contraseña</label>
            <input id="confirm-password" type="password" minlength="6" required />

            <div id="error" style="color:red;margin-top:8px;"></div>

            <button type="submit">Registrarme</button>
        </form>

        <p>¿Ya tenés cuenta? <a href="/src/pages/auth/login/login.html">Ingresar</a></p>
    </main>

    <script type="module" src="/src/pages/auth/registro/registro.ts" defer></script>
</body>

</html>

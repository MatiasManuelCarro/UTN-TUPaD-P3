<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <main>
        <h1>Registro</h1>
        <form id="register-form" novalidate>
            <label for="email">Email</label>
            <input id="email" type="email" required />

            <label for="password">Contraseña</label>
            <input id="password" type="password" minlength="6" required />

            <label for="confirm-password">Confirmar contraseña</label>
            <input id="confirm-password" type="password" minlength="6" required />

            <div id="error" style="color:red;margin-top:8px;"></div>

            <button type="submit">Registrarme</button>
        </form>

        <p>¿Ya tenés cuenta? <a href="/src/pages/auth/login/login.html">Ingresar</a></p>
    </main>

    <script type="module" src="/src/main.ts" defer></script>
    <script type="module" src="/src/pages/auth/registro/registro.ts" defer></script>

</body>

</html>
